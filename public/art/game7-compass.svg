    <path d="M20 7.8 L24.1 24.1 L20 21.9 Z" fill="#fff0a8" opacity="0.55"/>
    <path d="M20 7.8 L15.9 24.1 L20 21.9 Z" fill="#a65b0e" opacity="0.45"/>
