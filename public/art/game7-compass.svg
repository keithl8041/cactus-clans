      <stop offset="0%" stop-color="#fff2a6"/>
      <stop offset="35%" stop-color="#ffd34d"/>
      <stop offset="70%" stop-color="#c47a15"/>
      <stop offset="100%" stop-color="#6f3b08"/>
    </linearGradient>
    <linearGradient id="goldDark" x1="0" y1="0" x2="1" y2="1">
