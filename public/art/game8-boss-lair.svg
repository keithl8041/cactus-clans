<svg xmlns="http://www.w3.org/2000/svg" width="430" height="400" viewBox="0 0 430 400">
  <defs>
    <!-- Cave interior depth gradient -->
    <radialGradient id="caveDepth" cx="75%" cy="55%" r="65%">
      <stop offset="0%" stop-color="#3a1830"/>
      <stop offset="60%" stop-color="#1e0c1a"/>
      <stop offset="100%" stop-color="#0e060e"/>
    </radialGradient>
    <!-- Left-edge soft shadow to blend with the game world -->
    <linearGradient id="leftBlend" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0e060e" stop-opacity="0.0"/>
      <stop offset="20%" stop-color="#0e060e" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#0e060e" stop-opacity="0.0"/>
    </linearGradient>
    <!-- Glow behind eyes -->
    <radialGradient id="eyeGlow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4040" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eyeGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4040" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
    </radialGradient>
    <!-- Web opacity filter -->
    <filter id="webGlow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Cave interior fill ── -->
  <rect width="430" height="400" fill="url(#caveDepth)"/>

  <!-- ── Rocky cave-mouth arch — the left "wall" the player can't pass ── -->
  <!-- Outer rock face (darker base) -->
  <path d="
    M 0,400
    L 0,0
    L 95,0
    C 95,0 108,18 104,55
    C 100,92 112,115 108,155
    C 104,195 118,220 112,265
    C 106,310 120,338 114,375
    L 110,400
    Z
  " fill="#4a2c10"/>

  <!-- Mid rock layer (main visible face) -->
  <path d="
    M 0,400
    L 0,0
    L 78,0
    C 82,0 94,22 88,58
    C 82,94 96,118 90,158
    C 84,198 98,224 92,268
    C 86,312 100,340 94,376
    L 90,400
    Z
  " fill="#6b3e18"/>

  <!-- Rock highlight / surface texture -->
  <path d="
    M 0,400
    L 0,0
    L 62,0
    C 68,0 76,28 70,64
    C 64,100 78,122 72,162
    C 66,202 78,228 72,272
    C 66,316 76,342 70,378
    L 66,400
    Z
  " fill="#7e4e22"/>

  <!-- Rock crevice lines for texture -->
  <path d="M 55,0 Q 65,40 58,90 Q 50,140 62,190 Q 72,240 60,290 Q 48,340 58,400"
        fill="none" stroke="#3a2010" stroke-width="2" opacity="0.6"/>
  <path d="M 40,0 Q 48,50 42,100 Q 36,160 46,210 Q 54,260 44,310 Q 34,360 42,400"
        fill="none" stroke="#3a2010" stroke-width="1.5" opacity="0.4"/>

  <!-- ── Cave ceiling overhang (top edge) ── -->
  <path d="
    M 68,0 L 430,0 L 430,30
    C 380,28 340,35 300,25
    C 260,15 220,38 180,28
    C 150,20 130,40 110,32
    L 88,8
    Z
  " fill="#3a2010" opacity="0.7"/>

  <!-- Stalactites hanging from ceiling -->
  <path d="M 130,0 L 140,0 L 133,52 Z" fill="#4a2c10"/>
  <path d="M 170,0 L 182,0 L 174,44 Z" fill="#4a2c10"/>
  <path d="M 218,0 L 228,0 L 221,38 Z" fill="#3e2408"/>
  <path d="M 265,0 L 273,0 L 268,30 Z" fill="#3e2408"/>
  <path d="M 310,0 L 318,0 L 313,26 Z" fill="#3e2408"/>
  <path d="M 355,0 L 362,0 L 357,22 Z" fill="#3e2408"/>
  <path d="M 396,0 L 402,0 L 399,18 Z" fill="#3e2408"/>

  <!-- ── Spider webs ── -->
  <!-- Top web — near the cave mouth (upper-left of SVG) -->
  <g opacity="0.5" stroke="#c0bcd8" stroke-width="0.9" fill="none" filter="url(#webGlow)">
    <!-- Hub at ~(92, 15) -->
    <line x1="92" y1="15" x2="160" y2="58"/>
    <line x1="92" y1="15" x2="140" y2="82"/>
    <line x1="92" y1="15" x2="118" y2="100"/>
    <line x1="92" y1="15" x2="96" y2="118"/>
    <line x1="92" y1="15" x2="76" y2="96"/>
    <!-- Concentric rings -->
    <path d="M 120,46 Q 104,26 82,52"/>
    <path d="M 140,72 Q 104,42 76,78"/>
    <path d="M 122,96 Q 100,68 78,96"/>
  </g>

  <!-- Upper-right web (depth of cave) -->
  <g opacity="0.28" stroke="#c0bcd8" stroke-width="0.8" fill="none">
    <line x1="350" y1="8" x2="410" y2="55"/>
    <line x1="350" y1="8" x2="390" y2="72"/>
    <line x1="350" y1="8" x2="360" y2="80"/>
    <line x1="350" y1="8" x2="320" y2="60"/>
    <path d="M 374,38 Q 354,20 330,42"/>
    <path d="M 390,60 Q 355,36 322,62"/>
  </g>

  <!-- Bottom-left web (floor level, near cave mouth) -->
  <g opacity="0.38" stroke="#c0bcd8" stroke-width="0.9" fill="none" filter="url(#webGlow)">
    <!-- Hub at ~(86, 378) -->
    <line x1="86" y1="378" x2="150" y2="340"/>
    <line x1="86" y1="378" x2="136" y2="316"/>
    <line x1="86" y1="378" x2="108" y2="308"/>
    <line x1="86" y1="378" x2="88" y2="310"/>
    <path d="M 130,358 Q 100,374 96,330"/>
    <path d="M 144,336 Q 102,358 100,312"/>
  </g>

  <!-- Mid-cave hanging web strand -->
  <path d="M 200,0 Q 215,60 210,120" stroke="#c0bcd8" stroke-width="0.7" fill="none" opacity="0.2"/>
  <path d="M 280,0 Q 295,45 288,95"  stroke="#c0bcd8" stroke-width="0.7" fill="none" opacity="0.18"/>

  <!-- ── Glowing eyes deep in the cave ── -->
  <!-- Pair 1 (main pair, centre-right) -->
  <ellipse cx="298" cy="148" rx="22" ry="14" fill="url(#eyeGlow1)"/>
  <ellipse cx="348" cy="148" rx="22" ry="14" fill="url(#eyeGlow1)"/>
  <ellipse cx="298" cy="148" rx="7" ry="5" fill="#ff5050" opacity="0.85"/>
  <ellipse cx="348" cy="148" rx="7" ry="5" fill="#ff5050" opacity="0.85"/>
  <!-- Slit pupils -->
  <ellipse cx="298" cy="148" rx="2" ry="5" fill="#1a0000" opacity="0.9"/>
  <ellipse cx="348" cy="148" rx="2" ry="5" fill="#1a0000" opacity="0.9"/>

  <!-- Pair 2 (further back, dimmer) -->
  <ellipse cx="380" cy="210" rx="16" ry="10" fill="url(#eyeGlow2)"/>
  <ellipse cx="412" cy="210" rx="16" ry="10" fill="url(#eyeGlow2)"/>
  <ellipse cx="380" cy="210" rx="5" ry="4" fill="#cc3030" opacity="0.6"/>
  <ellipse cx="412" cy="210" rx="5" ry="4" fill="#cc3030" opacity="0.6"/>

  <!-- ── Ambient purple cave glow on walls ── -->
  <ellipse cx="250" cy="320" rx="160" ry="80" fill="#6a3a5a" opacity="0.12"/>
  <ellipse cx="360" cy="160" rx="100" ry="60" fill="#8040a0" opacity="0.07"/>

  <!-- ── Bone/skull prop on cave floor (flavour) ── -->
  <ellipse cx="160" cy="393" rx="14" ry="9" fill="#c8b890" opacity="0.55"/>
  <rect    x="152" y="396" width="5"  height="12" rx="2" fill="#c8b890" opacity="0.5"/>
  <rect    x="163" y="396" width="5"  height="10" rx="2" fill="#c8b890" opacity="0.5"/>

  <!-- ── Left-edge blend: thin dark strip so the rock doesn't hard-clip ── -->
  <rect x="0" y="0" width="8" height="400" fill="#0e060e" opacity="0.25"/>
</svg>
