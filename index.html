<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="theme-color" content="#1f6f3f" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- iOS Safari doesn't honour the Fullscreen API, but launching from the
         Home Screen with these meta tags hides the URL bar and tab bar. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cactus Clans" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="icon" href="/logo.png" />
    <title>An Adventure Through the Prickly Wilds | Cactus Clans</title>

    <!-- SEO: default description (updated per-page by useSeoMeta hook) -->
    <meta name="description" content="Cactus Clans is a free browser game and printable trading card set made by school friends. Pick a clan, clear eight mini-games, and race the leaderboard!" />
    <link rel="canonical" href="https://www.cactusclans.co.uk" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Cactus Clans" />
    <meta property="og:title" content="An Adventure Through the Prickly Wilds | Cactus Clans" />
    <meta property="og:description" content="Cactus Clans is a free browser game and printable trading card set made by school friends. Pick a clan, clear eight mini-games, and race the leaderboard!" />
    <meta property="og:url" content="https://www.cactusclans.co.uk" />
    <meta property="og:image" content="https://www.cactusclans.co.uk/logo.png" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="An Adventure Through the Prickly Wilds | Cactus Clans" />
    <meta name="twitter:description" content="Cactus Clans is a free browser game and printable trading card set made by school friends. Pick a clan, clear eight mini-games, and race the leaderboard!" />
    <meta name="twitter:image" content="https://www.cactusclans.co.uk/logo.png" />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
