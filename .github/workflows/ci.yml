name: ci

# Validation only. This workflow runs in GitHub's sandbox, uses NO secrets, and
# never touches Cloudflare — so it is safe to run on pull requests from forks.
# Production deploys are handled separately by Cloudflare Workers Builds, which
# watches the `release` branch (see CONTRIBUTING.md). Merging a PR here does NOT
# deploy.
#
# Uses `pull_request` (NOT `pull_request_target`): fork PRs run with a read-only
# token and no access to repository or environment secrets.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Primary correctness gate — strict TS for both src/ and worker/.
      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
