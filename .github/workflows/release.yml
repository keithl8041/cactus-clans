name: Manual Merge Main to Release
on:
  workflow_dispatch: # Allows manual triggering from the Actions tab
jobs:
  merge-branches:
    runs-on: ubuntu-latest
 
    # Grants the action permission to write changes to your repository
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so it can see both branches
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Merge main into release
        run: |
          # Fetch latest changes
          git fetch origin main
          git fetch origin release

          # Switch to release branch
          git checkout release

          # Merge main into release
          echo "Merging main into release..."
          git merge origin/main --no-edit

          # Push changes back to origin
          git push origin release
